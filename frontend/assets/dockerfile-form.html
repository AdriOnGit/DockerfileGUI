<!-- Sezione Sinistra: Form -->
<h5>Istruzioni Dockerfile</h5>
<div class="card p-4 form-box">
    <form id="dockerfileForm" method="POST" action="http://localhost:8080/DockerfileGenerator.php">
        <div class="mb-3">
            <label for="from" class="form-label">FROM</label>
            <input type="text" class="form-control" id="from" name="from" placeholder="es: ubuntu" required>
        </div>

        <div class="mb-3" id="labelCommands">
            <label class="form-label">LABEL</label>
            <button id="addLabelbtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <div class="mb-3" id="argCommands">
            <label class="form-label">ARG</label>
            <button id="addArgbtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <div class="mb-3" id="envCommands">
            <label class="form-label">ENV</label>
            <button id="addEnvbtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <div class="mb-3" id="runCommands">
            <label class="form-label">RUN</label>
            <button id="addRunbtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <div class="mb-3" id="copyCommands">
            <label class="form-label">COPY</label>
            <button id="addCopybtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <div class="mb-3" id="addCommands">
            <label class="form-label">ADD</label>
            <button id="addAddbtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <div class="mb-3" id="exposeCommands">
            <label class="form-label">EXPOSE</label>
            <button id="addExposebtn" type="button" class="btn btn-secondary btn-sm">Aggiungi</button>
        </div>

        <button type="submit" class="btn btn-primary">Genera il Dockerfile!</button>
    </form>
</div>
